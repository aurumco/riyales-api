name: Sync Financial Market Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHON_VERSION: '3.13'
      BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      BRS_BASE_URL: ${{ secrets.BRS_BASE_URL }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'INFO' }}
      TZ: 'Asia/Tehran'
      GIT_USER_NAME: 'Market Data Bot'
      GIT_USER_EMAIL: 'market-data-bot@users.noreply.github.com'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetching and aggregation script
        run: python src/main.py

      - name: Check directory contents (for debugging)
        run: |
          echo "--- Data Directory ---"
          ls -la data/
          echo "--- Logs Directory ---"
          ls -la logs/
        if: always()

      - name: Commit and push changes
        run: |
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"

          git add data/ logs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update market data" -m "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
          fi
        if: always()

  cleanup-workflows:
    name: Delete Old Workflow Runs
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: sudo apt-get install gh -y

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete old workflow runs
        run: |
          gh run list --limit 100 | grep -v '*' | awk '{print $1}' | while read run_id; do
            echo "Deleting run $run_id"
            gh run delete $run_id --yes
          done
