name: Sync Financial Market Data

on:
  schedule:
    # Run every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger
  push: # Trigger on pushes
    branches:
      - main # Adjust branch name if needed

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit back
    env:
      PYTHON_VERSION: '3.13'
      BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      BRS_BASE_URL: ${{ secrets.BRS_BASE_URL }}
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'INFO' }}
      TZ: 'Asia/Tehran'
      GIT_USER_NAME: 'Market Data Bot'
      GIT_USER_EMAIL: 'market-data-bot@users.noreply.github.com'
      # Define DuckDB version explicitly
      DUCKDB_VERSION: '1.2.2'
      # Use this variable to force cache invalidation when needed
      CACHE_VERSION: '1'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate diff

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          # Include CACHE_VERSION and DUCKDB_VERSION in the cache key to allow forced updates
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-duckdb${{ env.DUCKDB_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ env.CACHE_VERSION }}-duckdb${{ env.DUCKDB_VERSION }}-
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install DuckDB with specific version
          pip install duckdb==${{ env.DUCKDB_VERSION }} --force-reinstall
          
          # Report DuckDB version
          echo "Installed DuckDB version:"
          python -c "import duckdb; print(duckdb.__version__)"
          
          # Install other dependencies
          if [ -f requirements.txt ]; then
            # Modify requirements.txt to exclude duckdb (we installed it separately)
            grep -v "duckdb" requirements.txt > requirements_filtered.txt || cp requirements.txt requirements_filtered.txt
            pip install -r requirements_filtered.txt
            echo "Dependencies installed from requirements.txt (excluding DuckDB)"
          else
            echo "requirements.txt not found, installing minimal dependencies."
            pip install aiohttp pytz python-dotenv
          fi
        shell: bash

      - name: Run data fetching and aggregation script
        run: python src/main.py

      - name: Check directory contents (for debugging)
        run: |
          echo "--- Data Directory ---"
          ls -lah data/ || echo "Warning: data directory not found or cannot be listed."
          echo "--- Aggregates Directory ---"
          if [ -d "data/aggregates" ]; then
            ls -lah data/aggregates/
          else
            echo "Info: data/aggregates directory does not exist (likely no aggregates generated yet)."
          fi
          echo "--- Logs Directory ---"
          ls -lah logs/ || echo "Warning: logs directory not found or cannot be listed."
        if: always() # Run even if previous steps fail
        shell: bash

      - name: Commit and push changes
        run: |
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"
          # Add data, aggregates, and logs. Use --force if needed. Consider excluding logs if repo size is a concern.
          git add data/ logs/
          if git diff --staged --quiet; then
            echo "No changes detected in data/ or logs/ to commit."
          else
            echo "Changes detected. Committing and pushing..."
            git commit -m "Update market data [skip ci]" -m "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" -m "Triggered by: ${{ github.event_name }}"
            git push origin main
          fi
        # Decide if you want to commit even on script failure
        if: always()

  cleanup-workflows:
    name: Delete Old Workflow Runs
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || sudo apt-get update && sudo apt-get install curl -y
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && sudo apt-get update \
          && sudo apt-get install gh -y
        shell: bash

      - name: Authenticate with GitHub CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        shell: bash

      - name: Delete old workflow runs (keep recent 10)
        run: |
          echo "Fetching workflow runs..."
          # Get IDs of completed/failed/cancelled runs beyond the 10 most recent for this workflow
          RUNS_TO_DELETE=$(gh run list --workflow "${{ github.workflow }}" --limit 100 --json databaseId,status,createdAt --jq '.[] | select(.status == "completed" or .status == "failed" or .status == "cancelled") | .databaseId' | tail -n +11)

          if [ -z "$RUNS_TO_DELETE" ]; then
            echo "No old workflow runs found to delete (keeping last 10)."
          else
            echo "Deleting old workflow runs..."
            echo "$RUNS_TO_DELETE" | while read run_id; do
              echo "Deleting run $run_id"
              # Use --repo flag explicitly for clarity/safety
              gh run delete "$run_id" --repo "${{ github.repository }}" || echo "Warning: Failed to delete run $run_id"
              sleep 1 # Small delay between deletions
            done
            echo "Finished deleting old workflow runs."
          fi
        shell: bash
        env:
           GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
