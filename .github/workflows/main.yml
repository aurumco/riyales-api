name: Market Data Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.13'
  DUCKDB_VERSION: '1.2.2'

jobs:
  sync-data:
    name: Sync → Commit → Alert
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BRS_API_KEY:        ${{ secrets.BRS_API_KEY }}
      BRS_BASE_URL:       ${{ secrets.BRS_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_USER_ID:   ${{ secrets.TELEGRAM_USER_ID }}
      LOG_LEVELS:         ${{ secrets.LOG_LEVELS || 'ERROR' }}
    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: Run data-fetch script and capture logs
        run: |
          mkdir -p logs
          ts=$(date +"%Y%m%d_%H%M%S")
          python src/main.py 2>&1 | tee logs/market_data_${ts}.log
        shell: bash

      - name: Pull latest & Commit if any
        run: |
          git config --global user.name "Market Data Bot"
          git config --global user.email "market-data-bot@users.noreply.github.com"
          git pull --rebase origin main || true
          git add data/ logs/
          git diff --staged --quiet || (
            MSG=$(python src/get_commit_message.py)
            git commit -m "$MSG" -m "Triggered by: ${{ github.event_name }}"
            git push origin main
          )
        shell: bash

      - name: Send Telegram error log
        if: always()
        run: python src/alert_sender.py
        shell: bash

  cleanup:
    name: Cleanup
    needs: sync-data
    if: always()
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO:    ${{ github.repository }}
      WF:      ${{ github.workflow }}
    steps:
      - name: Remove old workflow runs (keep latest 24)
        run: |
          runs=$(gh run list \
            --repo "$REPO" \
            --workflow "$WF" \
            --limit 100 \
            --json databaseId,status \
            --jq '.[] | select(.status!="in_progress" and .status!="queued") | .databaseId')
          total=$(echo "$runs" | wc -l)
          if [ "$total" -le 24 ]; then exit 0; fi
          # delete all older than the 24 newest
          to_delete=$(echo "$runs" | tail -n +25)
          echo "$to_delete" | while read id; do
            gh api \
              -X DELETE \
              /repos/"$REPO"/actions/runs/"$id" \
              -H "Authorization: token $GH_TOKEN"
          done
        shell: bash
