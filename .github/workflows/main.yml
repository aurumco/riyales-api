name: Market Data Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.13'
  DUCKDB_VERSION: '1.2.2'

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies and record time
        run: |
          start=$(date +%s)
          python -m pip install --upgrade pip
          pip install duckdb==${{ env.DUCKDB_VERSION }} --force-reinstall
          if [ -f requirements.txt ]; then
            grep -v 'duckdb' requirements.txt > requirements_filtered.txt || cp requirements.txt requirements_filtered.txt
            pip install -r requirements_filtered.txt
          else
            pip install aiohttp pytz python-dotenv jdatetime requests
          fi
          end=$(date +%s)
          echo "Dependencies installed in $((end-start))s" >> $GITHUB_STEP_SUMMARY
        shell: bash

  sync:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run data script and measure duration
        run: |
          start=$(date +%s)
          python src/main.py 2>&1 | tee full.log
          end=$(date +%s)
          echo "Script ran in $((end-start))s" >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Filter log levels
        run: |
          grep -E -i 'DEBUG|INFO|WARNING|ERROR|CRITICAL' full.log > filtered.log || true
          echo "Filtered log lines saved" >> $GITHUB_STEP_SUMMARY
        shell: bash

      - name: Upload filtered logs
        uses: actions/upload-artifact@v4
        with:
          name: filtered-logs
          path: filtered.log

  commit:
    needs: sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GIT_USER_NAME: 'Market Data Bot'
      GIT_USER_EMAIL: 'market-data-bot@users.noreply.github.com'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commit if changes exist
        run: |
          git config --global user.name "${GIT_USER_NAME}"
          git config --global user.email "${GIT_USER_EMAIL}"
          git add data/ logs/
          git diff --staged --quiet || (
            MSG=$(python src/get_commit_message.py)
            git commit -m "$MSG" -m "Triggered by: ${{ github.event_name }}"
            git push origin main
          )
          echo "Commit step done" >> $GITHUB_STEP_SUMMARY
        shell: bash

  notify:
    needs: commit
    if: always()
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_USER_ID:   ${{ secrets.TELEGRAM_USER_ID }}
      LOG_LEVELS:         ${{ secrets.LOG_LEVELS || 'ERROR' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send alert
        run: |
          python src/alert_sender.py
        shell: bash

  cleanup-workflows:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install gh cli
        run: |
          sudo apt-get update
          sudo apt-get install gh -y
        shell: bash

      - name: Authenticate
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        shell: bash

      - name: Cleanup old runs (keep 24)
        run: |
          runs=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --limit 100 \
            --json databaseId,status --jq '.[] | select(.status!="in_progress" and .status!="queued") | .databaseId')
          total=$(echo "$runs" | wc -l)
          if [ "$total" -le 24 ]; then exit 0; fi
          to_delete=$(echo "$runs" | head -n -24)
          echo "$to_delete" | while read id; do
            gh run delete "$id" --repo "${{ github.repository }}" --yes
          done
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
