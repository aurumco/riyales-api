name: Market Data Sync

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 10 minutes
  workflow_dispatch:  # Manual trigger
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/sync-market-data.yml'

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    env:
      PYTHON_VERSION: '3.13'
      BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      BRS_BASE_URL: ${{ secrets.BRS_BASE_URL }}
      TZ: 'Asia/Tehran'
      LOG_LEVEL: 'INFO'
      # Explicitly set DuckDB version that's compatible with our SQL queries
      DUCKDB_VERSION: '1.2.2'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # Cache dependencies to speed up workflow
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-v2
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Check if DuckDB is already installed
        id: check-duckdb
        run: |
          python -c "import pkg_resources; print('Current DuckDB:', pkg_resources.get_distribution('duckdb').version)" || echo "DuckDB not installed"

      - name: Install dependencies with specific DuckDB version
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # Force reinstall DuckDB with the specific version
          pip uninstall -y duckdb
          pip install duckdb==${{ env.DUCKDB_VERSION }}
          
          # Verify the installed version
          python -c "import duckdb; print('Installed DuckDB version:', duckdb.__version__)"
      
      - name: Run data fetching script
        run: |
          mkdir -p data logs json
          python src/main.py
      
      - name: Check directory content
        run: |
          echo "=== CHECKING DATA DIRECTORY ==="
          ls -la data/
          echo "=== CHECKING JSON DIRECTORY ==="
          ls -la json/
          
      - name: Commit and push if changes
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/ json/ logs/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Data update $(date +'%Y-%m-%d %H:%M:%S')" && git push)

  cleanup-workflows:
    needs: sync-data
    runs-on: ubuntu-latest
    permissions:
      actions: write
    
    steps:
      - name: Remove old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 10 
