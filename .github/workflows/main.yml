name: Market Data Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PYTHON_VERSION: '3.13'
  DUCKDB_VERSION: '1.2.2'

jobs:
  sync-data:
    name: Sync & Notify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_USER_ID:   ${{ secrets.TELEGRAM_USER_ID }}
      LOG_LEVELS:         ${{ secrets.LOG_LEVELS || 'ERROR' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: Run data script
        run: python src/main.py
        shell: bash

      - name: Send Telegram Alert
        run: python src/alert_sender.py
        shell: bash

      - name: Commit & Push if needed
        run: |
          git config --global user.name "Market Data Bot"
          git config --global user.email "market-data-bot@users.noreply.github.com"
          git add data/ logs/
          git diff --staged --quiet || (
            MSG=$(python src/get_commit_message.py)
            git commit -m "$MSG" -m "Triggered by: ${{ github.event_name }}"
            git push origin main
          )
        shell: bash

  cleanup:
    name: Cleanup
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Install gh cli
        run: |
          sudo apt-get update
          sudo apt-get install gh -y
        shell: bash

      - name: Authenticate gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        shell: bash

      - name: Remove old runs
        run: |
          runs=$(gh run list --repo "${{ github.repository }}" --workflow "${{ github.workflow }}" --limit 100 \
            --json databaseId,status --jq '.[] | select(.status!="in_progress" and .status!="queued") | .databaseId')
          total=$(echo "$runs" | wc -l)
          if [ "$total" -le 24 ]; then exit 0; fi
          # delete all except the first (newest) 24
          to_delete=$(echo "$runs" | tail -n +25)
          echo "$to_delete" | while read id; do
            gh run delete "$id" --repo "${{ github.repository }}" --yes
          done
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
