# .github/workflows/main.yml

name: Sync Financial Market Data
on:
  schedule:
    # Attempt to run approximately every 8 minutes.
    - cron: '*/8 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHON_VERSION: '3.13'
      # Secrets - Ensure BRS_BASE_URL is also set in GitHub Secrets
      BRS_API_KEY: ${{ secrets.BRS_API_KEY }}
      BRS_BASE_URL: ${{ secrets.BRS_BASE_URL }}
      # --- NEW: Log Level Configuration ---
      # Set desired log level: DEBUG, INFO, WARNING, ERROR, CRITICAL (Default: INFO)
      LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'INFO' }} # Use secret or default to INFO
      TZ: 'Asia/Tehran'
      # Git commit details
      GIT_USER_NAME: 'Market Data Bot'
      GIT_USER_EMAIL: 'market-data-bot@users.noreply.github.com'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.PYTHON_VERSION }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetching and aggregation script
        id: run_script
        run: python src/main.py

      - name: Check directory contents (for debugging)
        run: |
          echo "--- Data Directory ---"
          ls -la data/
          echo "--- Logs Directory ---"
          ls -la logs/
        if: always()

      - name: Commit and push changes
        run: |
          echo "Configuring Git user..."
          git config --global user.name "${{ env.GIT_USER_NAME }}"
          git config --global user.email "${{ env.GIT_USER_EMAIL }}"

          echo "Checking for changes..."
          # Add data and log directories
          git add data/ logs/

          # Check staged changes
          if git diff --staged --quiet; then
            echo "No changes detected in data/ or logs/ to commit."
          else
            echo "Changes detected, committing..."
            # 2. Commit message without [skip ci]
            git commit -m "Update market data" -m "Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "Pushing changes..."
            git push origin main # Ensure 'main' is your default branch
            echo "Changes pushed successfully."
          fi
        if: always()
